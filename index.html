<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LowFrame - Minecraft Server</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

html,body{
height:100%;
margin:0;
scroll-behavior:smooth;
}

.font-display{font-family:'Lexend',sans-serif;}
.font-mono{font-family:'Space Mono',monospace;}

.page{display:none;}
.page.active{display:flex;}

.grass-pattern{
background:
linear-gradient(135deg,#1a472a 25%,transparent 25%),
linear-gradient(225deg,#1a472a 25%,transparent 25%),
linear-gradient(45deg,#1a472a 25%,transparent 25%),
linear-gradient(315deg,#1a472a 25%,#0f2d1a 25%);
background-size:20px 20px;
}

.pixel-border{
box-shadow:
inset -4px -4px 0 rgba(0,0,0,.3),
inset 4px 4px 0 rgba(255,255,255,.1);
}

.btn-minecraft{transition:.15s;}
.btn-minecraft:hover{transform:translateY(-3px);}
.btn-minecraft:active{transform:translateY(0);}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#111;
color:white;
padding:14px 24px;
border-radius:12px;
font-family:'Space Mono',monospace;
font-size:14px;
opacity:0;
transition:.3s;
border:2px solid #22c55e;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.status-online{animation:pulse 2s infinite;}

@keyframes pulse{
0%,100%{box-shadow:0 0 20px rgba(34,197,94,.3)}
50%{box-shadow:0 0 40px rgba(34,197,94,.7)}
}

.player-head{
width:48px;
height:48px;
border-radius:8px;
cursor:pointer;
transition:.15s;
}

.player-head:hover{
transform:scale(1.15);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#111;
padding:30px;
border-radius:16px;
text-align:center;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-left:6px;
}

.owner{background:#ef4444;}
.coowner{background:#f97316;}
.admin{background:#3b82f6;}

</style>
</head>

<body class="h-full">

<div class="grass-pattern text-white min-h-full">

<div id="home-page" class="page active flex-col min-h-full">

<section class="flex-1 flex flex-col items-center justify-center px-6 py-20 text-center">

<h1 class="font-display font-black text-6xl md:text-8xl">LowFrame</h1>

<p class="font-display text-xl text-green-200 mb-12">
a survival minecraft server.
</p>

<div class="flex flex-col md:flex-row gap-6">

<a href="https://discord.gg/EUTH5DjqVK"
target="_blank"
class="btn-minecraft px-10 py-5 bg-indigo-600 rounded-lg pixel-border font-bold">
Join our Discord
</a>

<button onclick="showServerPage()"
class="btn-minecraft px-10 py-5 bg-green-600 rounded-lg pixel-border font-bold">
Join the Server
</button>

<button onclick="showTrailer()"
class="btn-minecraft px-10 py-5 bg-red-600 rounded-lg pixel-border font-bold">
Trailer
</button>

</div>

</section>

<section class="px-6 py-20 bg-black/30">

<div class="max-w-4xl mx-auto text-center">

<h2 class="font-display font-bold text-3xl mb-8">
Server Status
</h2>

<div class="grid md:grid-cols-3 gap-6">

<div class="bg-black/40 rounded-xl p-6 pixel-border">
<div class="w-4 h-4 bg-green-500 rounded-full mx-auto mb-3 status-online"></div>
<p class="text-green-400 font-bold">ONLINE</p>
<p class="text-sm text-gray-400">Server Status</p>
</div>

<div class="bg-black/40 rounded-xl p-6 pixel-border">
<p id="status-motd" class="text-lg font-bold">Loading...</p>
<p class="text-sm text-gray-400">MOTD</p>
</div>

<div class="bg-black/40 rounded-xl p-6 pixel-border">
<p class="text-4xl font-bold">
<span id="status-players">0</span>/20
</p>
<p class="text-sm text-gray-400">Players Online</p>
</div>

</div>

<h3 class="font-display text-xl mt-10 mb-4">Online Players</h3>
<div id="player-heads" class="flex flex-wrap justify-center gap-4"></div>

<button onclick="showServerPage()"
class="btn-minecraft mt-10 px-8 py-4 bg-green-600 rounded-lg pixel-border font-bold">
Get Server IP →
</button>

</div>

</section>

<footer class="text-center py-6 opacity-50 text-sm bg-black/20">
© 2026 LowFrame Server
</footer>

</div>

</div>

<div id="toast" class="toast"></div>

<div id="player-modal" class="modal">
<div class="modal-box">

<h2 id="modal-name" class="text-2xl font-bold"></h2>
<div id="modal-rank" class="mt-2"></div>

<p class="mt-4">Joined: <span id="modal-join"></span></p>
<p>Playtime: <span id="modal-time"></span></p>

<button onclick="closeModal()" class="mt-6 bg-gray-700 px-6 py-2 rounded">
Close
</button>

</div>
</div>

<script>

const playerData={
"TheRealDwayne":{rank:"owner",joined:"Jan 2024",playtime:"120h"},
"daduckmanyt":{rank:"coowner",joined:"Feb 2024",playtime:"95h"},
"FramantedApple":{rank:"admin",joined:"Mar 2024",playtime:"80h"},
"TheAmazingDoge":{rank:"admin",joined:"Apr 2024",playtime:"72h"}
}

function rankBadge(rank){
if(rank==="owner") return '<span class="badge owner">OWNER</span>'
if(rank==="coowner") return '<span class="badge coowner">CO-OWNER</span>'
if(rank==="admin") return '<span class="badge admin">ADMIN</span>'
return ""
}

function showTrailer(){
window.open("https://www.youtube.com/watch?v=MiB9abBVawg","_blank")
}

function showServerPage(){
document.getElementById("home-page").classList.remove("active")
}

function showToast(msg){
const t=document.getElementById("toast")
t.textContent=msg
t.classList.add("show")
setTimeout(()=>{t.classList.remove("show")},2500)
}

async function updateServerStatus(){

try{

const response=await fetch("https://api.mcsrvstat.us/2/lowframe.modrinth.gg")
const data=await response.json()

if(data.online){

document.getElementById("status-motd").textContent =
data.motd.clean.join(" ")

document.getElementById("status-players").textContent =
data.players.online

loadPlayers(data.players.list || [])

}else{

document.getElementById("status-motd").textContent="Server Offline"
document.getElementById("status-players").textContent="0"

}

}catch{
document.getElementById("status-motd").textContent="Status Error"
}

}

function loadPlayers(list){

const container=document.getElementById("player-heads")
container.innerHTML=""

list.forEach(name=>{

const img=document.createElement("img")

img.src=`https://mc-heads.net/avatar/${name}/64`
img.className="player-head"
img.onclick=()=>openPlayer(name)

container.appendChild(img)

})

}

function openPlayer(name){

const info=playerData[name] || {
rank:"",
joined:"Unknown",
playtime:"Unknown"
}

document.getElementById("modal-name").textContent=name
document.getElementById("modal-join").textContent=info.joined
document.getElementById("modal-time").textContent=info.playtime
document.getElementById("modal-rank").innerHTML=rankBadge(info.rank)

document.getElementById("player-modal").style.display="flex"

}

function closeModal(){
document.getElementById("player-modal").style.display="none"
}

updateServerStatus()
setInterval(updateServerStatus,30000)

</script>

</body>
</html>
