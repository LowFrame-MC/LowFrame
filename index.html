<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LowFrame - Minecraft Server</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">

<style>
html,body{
    height:100%;
    margin:0;
    scroll-behavior:smooth;
    font-family: 'Lexend', sans-serif;
}

.grass-pattern{
    background:
    linear-gradient(135deg,#1a472a 25%,transparent 25%),
    linear-gradient(225deg,#1a472a 25%,transparent 25%),
    linear-gradient(45deg,#1a472a 25%,transparent 25%),
    linear-gradient(315deg,#1a472a 25%,#0f2d1a 25%);
    background-size:20px 20px;
}

.pixel-border{
    box-shadow:
    inset -4px -4px 0 rgba(0,0,0,.3),
    inset 4px 4px 0 rgba(255,255,255,.1);
    transition: all 0.2s ease;
}

.pixel-border:active {
    transform: translateY(2px);
    box-shadow: inset -2px -2px 0 rgba(0,0,0,.3);
}

.status-panel{
    background:#0f2d1a;
    border:2px solid #1a472a;
}

.player-head{
    width:52px;
    height:52px;
    border-radius:10px;
    cursor:pointer;
    transition:.25s;
}

.player-head:hover{
    transform:scale(1.2);
    filter:brightness(1.3);
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-box{
    background:#0f2d1a;
    padding:30px;
    border-radius:16px;
    width:320px;
    text-align:center;
    border:2px solid #1a472a;
}

.badge{
    font-size:12px;
    padding:3px 8px;
    border-radius:6px;
    margin-left:6px;
}

.owner{background:#ef4444;}
.coowner{background:#f97316;}
.admin{background:#3b82f6;}

.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:white;
    padding:14px 24px;
    border-radius:12px;
    opacity:0;
    transition:.3s;
    border:2px solid #22c55e;
    z-index: 1000;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(-10px);
}
</style>
</head>

<body class="grass-pattern text-white min-h-full">

<div class="max-w-5xl mx-auto px-6 py-16 text-center">

    <h1 class="text-7xl font-black mb-4">LowFrame</h1>
    <p class="text-green-200 mb-12">a survival minecraft server</p>

    <div class="flex justify-center gap-6 mb-12 flex-wrap">
        <button id="ip-button" onclick="copyIP()" class="bg-green-600 hover:bg-green-500 px-10 py-5 rounded pixel-border text-xl font-bold uppercase tracking-wide">
            Join Server
        </button>
    </div>

    <div class="grid md:grid-cols-3 gap-6 mb-12">
        <div class="status-panel p-6 rounded-xl pixel-border">
            <p class="text-green-400 font-bold">ONLINE</p>
            <p>Status</p>
        </div>

        <div class="status-panel p-6 rounded-xl pixel-border">
            <p id="status-motd" class="truncate">Loading...</p>
            <p class="text-gray-400 text-sm">MOTD</p>
        </div>

        <div class="status-panel p-6 rounded-xl pixel-border">
            <p class="text-4xl">
                <span id="status-players">0</span>/20
            </p>
        </div>
    </div>

    <h2 class="text-2xl mb-6">Online Players</h2>
    <div id="player-heads" class="flex flex-wrap justify-center gap-5 mb-14"></div>

</div>

<div id="player-modal" class="modal">
    <div class="modal-box">
        <h2 id="modal-name" class="text-2xl font-bold"></h2>
        <div id="modal-badge" class="mt-2"></div>
        <p class="mt-4">Joined: <span id="modal-join"></span></p>
        <p>Playtime: <span id="modal-time"></span></p>
        <button onclick="closeModal()" class="mt-6 bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded">Close</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* CONFIG */
const SERVER_IP = "play.mc-lowframe.org";

/* STAFF DATA */
const staffData = {
    "TheRealDwayne": {rank:"owner", joined:"2025-01-12", playtime:"120h"},
    "daduckmanyt": {rank:"coowner", joined:"2025-01-12", playtime:"95h"},
    "FramantedApple": {rank:"admin", joined:"2025-02-02", playtime:"80h"},
    "TheAmazingDoge": {rank:"admin", joined:"2025-02-08", playtime:"72h"}
};

/* UI & COPY LOGIC */
function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
}

function copyIP() {
    const btn = document.getElementById("ip-button");
    
    navigator.clipboard.writeText(SERVER_IP).then(() => {
        // Visual Feedback
        const originalText = btn.innerHTML;
        btn.innerHTML = "COPIED IP!";
        btn.classList.replace("bg-green-600", "bg-blue-600");

        toast("Copied: " + SERVER_IP);

        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.replace("bg-blue-600", "bg-green-600");
        }, 2000);
    }).catch(err => {
        console.error('Failed to copy: ', err);
    });
}

/* PLAYER MODAL */
function rankBadge(rank) {
    if(rank === "owner") return '<span class="badge owner">OWNER</span>';
    if(rank === "coowner") return '<span class="badge coowner">CO-OWNER</span>';
    if(rank === "admin") return '<span class="badge admin">ADMIN</span>';
    return "";
}

function openPlayer(name) {
    const data = staffData[name] || {joined: "Unknown", playtime: "Unknown", rank: ""};
    document.getElementById("modal-name").textContent = name;
    document.getElementById("modal-join").textContent = data.joined;
    document.getElementById("modal-time").textContent = data.playtime;
    document.getElementById("modal-badge").innerHTML = rankBadge(data.rank);
    document.getElementById("player-modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("player-modal").style.display = "none";
}

/* LOAD PLAYERS & STATUS */
async function updateServer() {
    const container = document.getElementById("player-heads");
    
    try {
        const res = await fetch(`https://api.mcsrvstat.us/2/${SERVER_IP}`);
        const data = await res.json();
        
        if (data.online) {
            // Update Stats
            document.getElementById("status-motd").textContent = data.motd.clean ? data.motd.clean.join(" ") : "Online";
            document.getElementById("status-players").textContent = data.players.online;
            
            // Update Player Heads
            container.innerHTML = "";
            if (data.players.list) {
                data.players.list.forEach(name => {
                    const img = document.createElement("img");
                    img.src = `https://mc-heads.net/avatar/${name}/64`;
                    img.className = "player-head";
                    img.title = name;
                    img.onclick = () => openPlayer(name);
                    container.appendChild(img);
                });
            } else {
                container.innerHTML = "<p class='text-gray-400'>No players online</p>";
            }
        } else {
            document.getElementById("status-motd").textContent = "Server Offline";
            container.innerHTML = "<p class='text-red-400'>Server is currently unreachable</p>";
        }
    } catch (e) {
        document.getElementById("status-motd").textContent = "Status Error";
        console.error("API Error:", e);
    }
}

// Run on load and every 30 seconds
updateServer();
setInterval(updateServer, 30000);
</script>

</body>
</html>
