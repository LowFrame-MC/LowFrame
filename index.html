<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LowFrame Minecraft Server</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:600px;
margin:auto;
}

h1{
color:#4ade80;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #334155;
}

.player{
display:inline-block;
margin:8px;
text-align:center;
}

.player img{
width:40px;
height:40px;
image-rendering:pixelated;
}

.ip{
cursor:pointer;
color:#38bdf8;
font-weight:bold;
}

.ip:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">

<h1>LowFrame Server</h1>

<p>
Server IP:
<span class="ip" onclick="copyIP()">lowframe.modrinth.gg:14416</span>
</p>

<p id="copyMessage"></p>

<table>
<tr>
<td>Status</td>
<td id="status">Checking...</td>
</tr>

<tr>
<td>Players</td>
<td id="players">-</td>
</tr>

<tr>
<td>Version</td>
<td id="version">-</td>
</tr>

<tr>
<td>Ping</td>
<td id="ping">-</td>
</tr>

<tr>
<td>MOTD</td>
<td id="motd">-</td>
</tr>
</table>

<h3>Online Players</h3>
<div id="playerList"></div>

</div>

<script>

const SERVER_IP = "lowframe.modrinth.gg:14416"

async function updateServer(){

try{

const res = await fetch("https://api.mcsrvstat.us/2/" + SERVER_IP)
const data = await res.json()

if(data.online){

document.getElementById("status").innerHTML="🟢 Online"
document.getElementById("players").innerHTML=data.players.online+" / "+data.players.max
document.getElementById("version").innerHTML=data.version
document.getElementById("ping").innerHTML=data.debug.ping+" ms"

if(data.motd && data.motd.clean){
document.getElementById("motd").innerHTML=data.motd.clean.join("<br>")
}

if(data.players && data.players.list){

let html=""

data.players.list.forEach(p=>{
html+=`
<div class="player">
<img src="https://mc-heads.net/avatar/${p}">
<div>${p}</div>
</div>
`
})

document.getElementById("playerList").innerHTML=html

}

}else{

document.getElementById("status").innerHTML="🔴 Offline"
document.getElementById("players").innerHTML="-"
document.getElementById("version").innerHTML="-"
document.getElementById("ping").innerHTML="-"
document.getElementById("motd").innerHTML="-"

}

}catch(e){

document.getElementById("status").innerHTML="Error connecting"

}

}

function copyIP(){

navigator.clipboard.writeText(SERVER_IP)

document.getElementById("copyMessage").innerText="IP copied to clipboard!"

setTimeout(()=>{
document.getElementById("copyMessage").innerText=""
},2000)

}

updateServer()

setInterval(updateServer,30000)

</script>

</body>
</html>
