<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LowFrame - Minecraft Server</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      scroll-behavior: smooth;
    }
    .app-wrapper {
      width: 100%;
      min-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .font-display { font-family: 'Lexend', sans-serif; }
    .font-mono { font-family: 'Space Mono', monospace; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
      50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.6); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .animate-fade-in { animation: fade-in-up 0.8s ease-out forwards; }
    .animate-delay-1 { animation-delay: 0.2s; opacity: 0; }
    .animate-delay-2 { animation-delay: 0.4s; opacity: 0; }
    .animate-delay-3 { animation-delay: 0.6s; opacity: 0; }
    
    .pixel-border {
      box-shadow: 
        inset -4px -4px 0px 0px rgba(0,0,0,0.3),
        inset 4px 4px 0px 0px rgba(255,255,255,0.1);
    }
    .grass-pattern {
      background: 
        linear-gradient(135deg, #1a472a 25%, transparent 25%),
        linear-gradient(225deg, #1a472a 25%, transparent 25%),
        linear-gradient(45deg, #1a472a 25%, transparent 25%),
        linear-gradient(315deg, #1a472a 25%, #0f2d1a 25%);
      background-size: 20px 20px;
      background-color: #0f2d1a;
    }
    .btn-minecraft {
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-minecraft:hover {
      transform: translateY(-3px);
    }
    .btn-minecraft:active {
      transform: translateY(1px);
    }
    .page { display: none; }
    .page.active { display: flex; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="app-wrapper grass-pattern"><!-- Home Page -->
   <div id="home-page" class="page active flex-col min-h-full"><!-- Hero Section -->
    <section class="flex-1 flex flex-col items-center justify-center px-6 py-20 relative"><!-- Floating particles -->
     <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute top-20 left-10 w-3 h-3 bg-green-400 opacity-40 rounded animate-float" style="animation-delay: 0s;"></div>
      <div class="absolute top-40 right-20 w-2 h-2 bg-emerald-300 opacity-30 rounded animate-float" style="animation-delay: 0.5s;"></div>
      <div class="absolute bottom-32 left-1/4 w-4 h-4 bg-green-500 opacity-25 rounded animate-float" style="animation-delay: 1s;"></div>
      <div class="absolute top-1/3 right-1/3 w-2 h-2 bg-lime-400 opacity-35 rounded animate-float" style="animation-delay: 1.5s;"></div>
     </div><!-- Main Content -->
     <div class="text-center z-10 animate-fade-in"><!-- Minecraft Block Icon -->
      <div class="mb-8 inline-block animate-float">
       <div class="w-24 h-24 mx-auto relative">
        <svg viewbox="0 0 100 100" class="w-full h-full"><!-- Grass block top --> <rect x="10" y="20" width="80" height="30" fill="#5d9b3d" /> <rect x="10" y="20" width="80" height="8" fill="#7bc74d" /> <!-- Dirt block bottom --> <rect x="10" y="50" width="80" height="30" fill="#8b5a2b" /> <rect x="20" y="55" width="10" height="10" fill="#6b4423" /> <rect x="45" y="60" width="15" height="10" fill="#6b4423" /> <rect x="70" y="55" width="8" height="8" fill="#6b4423" /> <!-- Grass details --> <rect x="15" y="22" width="8" height="4" fill="#4a8a2f" /> <rect x="40" y="24" width="12" height="3" fill="#4a8a2f" /> <rect x="65" y="22" width="10" height="4" fill="#4a8a2f" />
        </svg>
       </div>
      </div>
      <h1 id="main-title" class="font-display font-black text-6xl md:text-8xl text-white tracking-tight mb-4" style="text-shadow: 4px 4px 0px #0f2d1a, 8px 8px 0px rgba(0,0,0,0.3);">LowFrame</h1>
      <p id="subtitle" class="font-display text-xl md:text-2xl text-green-200 opacity-90 mb-16">a survival minecraft server.</p><!-- Scroll indicator -->
      <div class="animate-bounce mt-8">
       <svg class="w-8 h-8 mx-auto text-green-400 opacity-70" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
       </svg>
       <p class="text-green-400 opacity-70 text-sm mt-2 font-display">scroll down</p>
      </div>
     </div>
    </section><!-- Buttons Section -->
    <section class="py-20 px-6">
     <div class="max-w-4xl mx-auto">
      <div class="flex flex-col md:flex-row gap-6 justify-center items-center"><!-- Discord Button --> <a href="https://discord.gg/EUTH5DjqVK" target="_blank" rel="noopener noreferrer" class="btn-minecraft w-full md:w-auto px-10 py-5 bg-indigo-600 hover:bg-indigo-500 text-white font-display font-bold text-lg rounded-lg pixel-border animate-fade-in animate-delay-1 flex items-center justify-center gap-3">
        <svg class="w-6 h-6" viewbox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" />
        </svg> Join our Discord </a> <!-- Join Server Button --> <button onclick="showServerPage()" class="btn-minecraft w-full md:w-auto px-10 py-5 bg-green-600 hover:bg-green-500 text-white font-display font-bold text-lg rounded-lg pixel-border animate-pulse-glow animate-fade-in animate-delay-2 flex items-center justify-center gap-3">
        <svg class="w-6 h-6" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
        </svg> Join the Server </button> <!-- Trailer Button --> <button onclick="showTrailerMessage()" class="btn-minecraft w-full md:w-auto px-10 py-5 bg-red-600 hover:bg-red-500 text-white font-display font-bold text-lg rounded-lg pixel-border animate-fade-in animate-delay-3 flex items-center justify-center gap-3">
        <svg class="w-6 h-6" viewbox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z" />
        </svg> Trailer </button>
      </div>
     </div>
    </section><!-- Footer -->
    <footer class="py-6 text-center">
     <p class="text-green-300 opacity-50 font-display text-sm">© 2026 LowFrame Server</p>
    </footer>
   </div><!-- Server Info Page -->
   <div id="server-page" class="page flex-col min-h-full items-center justify-center px-6 py-12">
    <div class="max-w-2xl w-full text-center"><!-- Back Button --> <button onclick="showHomePage()" class="mb-12 px-6 py-3 bg-gray-800 hover:bg-gray-700 text-green-300 font-display font-medium rounded-lg transition-all inline-flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg> Back </button> <!-- Server Info Card -->
     <div class="bg-black/40 backdrop-blur-sm rounded-2xl p-10 pixel-border">
      <h2 id="server-title" class="font-display font-black text-3xl md:text-5xl text-white mb-10" style="text-shadow: 3px 3px 0px #0f2d1a;">"best survival minecraft server"</h2>
      <div class="space-y-6"><!-- Java IP -->
       <div class="bg-black/30 rounded-xl p-6">
        <p class="text-green-400 font-display text-sm uppercase tracking-wider mb-2">Java IP</p>
        <p id="java-ip" class="font-mono text-2xl md:text-3xl text-white select-all cursor-pointer hover:text-green-300 transition-colors">lowframe.modrinth.gg:14416</p>
       </div><!-- Bedrock IP -->
       <div class="bg-black/30 rounded-xl p-6">
        <p class="text-green-400 font-display text-sm uppercase tracking-wider mb-2">Bedrock IP</p>
        <p id="bedrock-ip" class="font-mono text-2xl md:text-3xl text-white select-all cursor-pointer hover:text-green-300 transition-colors">lowframe.modrinth.gg</p>
       </div><!-- Bedrock Port -->
       <div class="bg-black/30 rounded-xl p-6">
        <p class="text-green-400 font-display text-sm uppercase tracking-wider mb-2">Bedrock Port</p>
        <p id="bedrock-port" class="font-mono text-2xl md:text-3xl text-white select-all cursor-pointer hover:text-green-300 transition-colors">20580</p>
       </div>
      </div><!-- Platform Notice -->
      <p class="mt-10 text-green-200 opacity-70 font-display text-sm">you must have a valid copy of java to play on bedrock</p>
     </div>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      main_title: 'LowFrame',
      subtitle: 'a survival minecraft server.',
      server_title: '"best survival minecraft server"',
      java_ip: 'lowframe.modrinth.gg:14416',
      bedrock_ip: 'lowframe.modrinth.gg',
      bedrock_port: '20580',
      background_color: '#0f2d1a',
      accent_color: '#22c55e',
      text_color: '#ffffff',
      button_color: '#16a34a',
      secondary_color: '#4f46e5'
    };

    function showServerPage() {
      document.getElementById('home-page').classList.remove('active');
      document.getElementById('server-page').classList.add('active');
    }

    function showHomePage() {
      document.getElementById('server-page').classList.remove('active');
      document.getElementById('home-page').classList.add('active');
    }

    function showTrailerMessage() {
      window.open('https://www.youtube.com/watch?v=MiB9abBVawg', '_blank', 'noopener,noreferrer');
    }

    async function onConfigChange(config) {
      document.getElementById('main-title').textContent = config.main_title || defaultConfig.main_title;
      document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
      document.getElementById('server-title').textContent = config.server_title || defaultConfig.server_title;
      document.getElementById('java-ip').textContent = config.java_ip || defaultConfig.java_ip;
      document.getElementById('bedrock-ip').textContent = config.bedrock_ip || defaultConfig.bedrock_ip;
      document.getElementById('bedrock-port').textContent = config.bedrock_port || defaultConfig.bedrock_port;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.button_color || defaultConfig.button_color,
            set: (value) => { config.button_color = value; window.elementSdk.setConfig({ button_color: value }); }
          },
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle', config.subtitle || defaultConfig.subtitle],
        ['server_title', config.server_title || defaultConfig.server_title],
        ['java_ip', config.java_ip || defaultConfig.java_ip],
        ['bedrock_ip', config.bedrock_ip || defaultConfig.bedrock_ip],
        ['bedrock_port', config.bedrock_port || defaultConfig.bedrock_port]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
