<!doctype html>
<html lang="en" class="h-full">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LowFrame - Minecraft Server</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f2d1a;
color:white;
font-family:sans-serif;
margin:0;
}

.section{
max-width:700px;
margin:auto;
padding:40px;
}

.ip{
cursor:pointer;
color:#4ade80;
font-weight:bold;
}

.ip:hover{
text-decoration:underline;
}

.player{
display:flex;
align-items:center;
gap:6px;
background:rgba(0,0,0,.3);
padding:5px 8px;
border-radius:6px;
}

</style>

</head>

<body>

<!-- SERVER INFO -->

<div class="section">

<h1 style="font-size:48px;font-weight:bold;">LowFrame</h1>

<p style="color:#86efac;margin-bottom:30px;">A survival minecraft server</p>

<div>

<p>Java IP</p>
<p class="ip" onclick="copyIP()">lowframe.modrinth.gg:14416</p>

</div>

<br>

<div>

<p>Bedrock IP</p>
<p>lowframe.modrinth.gg</p>

</div>

<br>

<div>

<p>Bedrock Port</p>
<p>20580</p>

</div>

<p id="copyMessage"></p>

</div>


<!-- SERVER STATUS (SCROLL DOWN) -->

<div class="section">

<h2 style="font-size:32px;font-weight:bold;">Server Status</h2>

<table style="width:100%;margin-top:20px;">

<tr>
<td>Status</td>
<td id="status">Checking...</td>
</tr>

<tr>
<td>Players</td>
<td id="players">-</td>
</tr>

<tr>
<td>Version</td>
<td id="version">-</td>
</tr>

<tr>
<td>Ping</td>
<td id="ping">-</td>
</tr>

<tr>
<td>MOTD</td>
<td id="motd">-</td>
</tr>

</table>

<h3 style="margin-top:25px;">Online Players</h3>

<div id="playerList" style="display:flex;flex-wrap:wrap;gap:10px;"></div>

</div>


<script>

const SERVER_IP="lowframe.modrinth.gg:14416"

function copyIP(){

navigator.clipboard.writeText(SERVER_IP)

document.getElementById("copyMessage").innerText="IP copied!"

setTimeout(()=>{
document.getElementById("copyMessage").innerText=""
},2000)

}

async function updateServer(){

try{

const res=await fetch("https://api.mcsrvstat.us/2/"+SERVER_IP)

const data=await res.json()

if(data.online){

document.getElementById("status").innerText="🟢 Online"

document.getElementById("players").innerText=data.players.online+" / "+data.players.max

document.getElementById("version").innerText=data.version

document.getElementById("motd").innerText=data.motd.clean.join(" ")

document.getElementById("ping").innerText=data.debug.ping+" ms"

if(data.players.list){

let html=""

data.players.list.forEach(p=>{

html+=`
<div class="player">
<img src="https://mc-heads.net/avatar/${p}/24">
<span>${p}</span>
</div>
`

})

document.getElementById("playerList").innerHTML=html

}

}else{

document.getElementById("status").innerText="🔴 Offline"

}

}catch{

document.getElementById("status").innerText="Error"

}

}

updateServer()

setInterval(updateServer,30000)

</script>

</body>
</html>
